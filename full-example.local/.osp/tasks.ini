[full-example.local]

Launch project app         = * * * * * 1 1 cmd.exe /c "osp project {host} start"
Calling cron.php via HTTPS = */5 * * * * * 1 cmd.exe /c "wget.exe --secure-protocol=TLSv1_2 -q --no-cache {host_scheme}://{host}{scheme_port}/cron.php -O nul"
Calling cron.php from PHP  = */30 * * * * * 0 cmd.exe /c "osp project {host} & php -f cron.php"
