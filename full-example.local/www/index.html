<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>www.example.local</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            position: relative;
            transition: background 0.5s ease;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #1e3a8a 0%, #312e81 100%);
                color: #fef3c7;
            }
            
            .grid-background {
                position: absolute;
                width: 100%;
                height: 100%;
                background-image: 
                    linear-gradient(rgba(251, 191, 36, 0.05) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(251, 191, 36, 0.05) 1px, transparent 1px);
                background-size: 50px 50px;
                background-position: center center;
            }
            
            h1 {
                color: #fef3c7;
                text-shadow: 
                    3px 3px 0px #dc2626,
                    6px 6px 0px #7c2d12;
            }
            
            .www-part {
                color: #fbbf24;
                text-shadow: 
                    2px 2px 0px #b45309,
                    4px 4px 0px #78350f;
            }
            
            .dot {
                color: #ef4444;
            }
        }

        @media (prefers-color-scheme: light) {
            body {
                background: linear-gradient(135deg, #bfdbfe 0%, #ddd6fe 100%);
                color: #1e3a8a;
            }
            
            .grid-background {
                position: absolute;
                width: 100%;
                height: 100%;
                background-image: 
                    linear-gradient(rgba(124, 58, 237, 0.06) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(124, 58, 237, 0.06) 1px, transparent 1px);
                background-size: 50px 50px;
                background-position: center center;
            }
            
            h1 {
                color: #1e3a8a;
                text-shadow: 
                    3px 3px 0px #fbbf24,
                    6px 6px 0px #f59e0b;
            }
            
            .www-part {
                color: #dc2626;
                text-shadow: 
                    2px 2px 0px #fca5a5,
                    4px 4px 0px #fecaca;
            }
            
            .dot {
                color: #ef4444;
            }
        }

        .container {
            position: relative;
            text-align: center;
            z-index: 10;
            perspective: 1000px;
        }

        h1 {
            font-size: 4rem;
            font-weight: 700;
            position: relative;
            animation: bounceIn 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: inline-block;
            letter-spacing: -0.03em;
        }

        .www-part {
            font-weight: 700;
            display: inline-block;
            animation: wobble 2s ease-in-out infinite;
        }

        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 5;
            border-radius: 50%;
            width: 4px;
            height: 4px;
        }

        @media (prefers-color-scheme: dark) {
            .particle {
                animation: convergeParticleDark 2.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            }
        }

        @media (prefers-color-scheme: light) {
            .particle {
                animation: convergeParticleLight 2.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            }
        }

        @keyframes convergeParticleDark {
            0% {
                transform: translate(0, 0) scale(0);
                opacity: 0;
            }
            15% {
                opacity: 1;
            }
            85% {
                opacity: 1;
            }
            100% {
                transform: translate(var(--target-x), var(--target-y)) scale(1);
                opacity: 0;
            }
        }

        @keyframes convergeParticleLight {
            0% {
                transform: translate(0, 0) scale(0);
                opacity: 0;
            }
            15% {
                opacity: 0.8;
            }
            85% {
                opacity: 0.8;
            }
            100% {
                transform: translate(var(--target-x), var(--target-y)) scale(1);
                opacity: 0;
            }
        }

        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.3);
            }
            50% {
                opacity: 1;
                transform: scale(1.1);
            }
            70% {
                transform: scale(0.9);
            }
            100% {
                transform: scale(1);
            }
        }

        @keyframes wobble {
            0%, 100% {
                transform: translateY(0px);
            }
            25% {
                transform: translateY(-5px);
            }
            50% {
                transform: translateY(0px);
            }
            75% {
                transform: translateY(-3px);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="grid-background"></div>
    
    <div class="container">
        <h1>
            <span class="www-part">www<span class="dot">.</span></span>example.local
        </h1>
    </div>

    <script>
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        const colorsDark = [
            '#ef4444', // Red
            '#f59e0b', // Orange
            '#fbbf24', // Yellow
            '#10b981', // Green
            '#06b6d4', // Cyan
            '#3b82f6', // Blue
            '#8b5cf6', // Violet
            '#ec4899', // Pink
            '#f97316', // Orange
            '#a855f7', // Purple
        ];

        const colorsLight = [
            '#ef4444', // Red
            '#f59e0b', // Orange
            '#fbbf24', // Yellow
            '#10b981', // Green
            '#06b6d4', // Cyan
            '#3b82f6', // Blue
            '#8b5cf6', // Violet
            '#ec4899', // Pink
            '#f97316', // Orange
            '#a855f7', // Purple
        ];

        function getDotPosition() {
            const dot = document.querySelector('.dot');
            const rect = dot.getBoundingClientRect();
            
            const centerX = rect.left + (rect.width / 2);
            const threeQuartersY = rect.top + (rect.height * 3 / 4);
            
            return {
                x: centerX,
                y: threeQuartersY
            };
        }

        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            const angle = Math.random() * Math.PI * 2;
            const distance = 400 + Math.random() * 400;
            const startX = Math.cos(angle) * distance;
            const startY = Math.sin(angle) * distance;
            
            particle.style.left = (window.innerWidth / 2 + startX) + 'px';
            particle.style.top = (window.innerHeight / 2 + startY) + 'px';
            
            const dotPos = getDotPosition();
            const targetX = dotPos.x - (window.innerWidth / 2 + startX);
            const targetY = dotPos.y - (window.innerHeight / 2 + startY);
            
            particle.style.setProperty('--target-x', targetX + 'px');
            particle.style.setProperty('--target-y', targetY + 'px');
            
            const colors = isDark ? colorsDark : colorsLight;
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            particle.style.backgroundColor = color;
            particle.style.boxShadow = `
                0 0 10px ${color},
                0 0 20px ${color}
            `;
            
            particle.style.animationDelay = Math.random() * 0.3 + 's';
            
            document.body.appendChild(particle);
            
            setTimeout(() => {
                particle.remove();
            }, 3000);
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                for (let i = 0; i < 200; i++) {
                    setTimeout(() => createParticle(), i * 10);
                }
            }, 600);
        });
    </script>
</body>
</html>
