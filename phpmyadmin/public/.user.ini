default_socket_timeout  = 900
display_errors          = Off      
display_startup_errors  = Off                  
error_reporting         = 0
file_uploads            = On
max_execution_time      = 900
max_input_time          = 900
max_input_vars          = 10000
memory_limit            = 1024M
post_max_size           = 512M
upload_max_filesize     = 512M
xdebug.mode             = off
xdebug.profiler_enable  = 0
xdebug.remote_autostart = 0  
xdebug.remote_enable    = 0
