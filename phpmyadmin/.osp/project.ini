[phpmyadmin]

app_start_command = auto
backend_enabled   = off
backend_ip        = auto
backend_port      = auto
base_url          = {host_scheme}://{host_decoded}{scheme_port}
bind_ip           = auto
environment       = auto
http_engine       = Apache
http_port         = auto
https_port        = auto
node_engine       = auto
php_engine        = PHP-8.3
primary_domain    = off
project_category  = 
project_enabled   = on
project_root      = {base_dir}
server_aliases    = 
terminal_codepage = auto
tls_cert_file     = auto
tls_enabled       = auto
tls_key_file      = auto
web_root          = {base_dir}
